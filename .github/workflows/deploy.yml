name: Deploy YDG to AWS
on:
  push:
    branches: [main]
jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export PATH=$PATH:/usr/local/bin
            DIAG=/tmp/ydg_diag.txt

            {
              echo "=== DATE ==="
              date
              echo "=== PORT 80 PROCESSES ==="
              sudo lsof -i:80 2>/dev/null || ss -tlnp | grep ':80'
              echo "=== PORT 3000 PROCESSES ==="
              sudo lsof -i:3000 2>/dev/null || ss -tlnp | grep ':3000'
              echo "=== ALL NODE/LITESPEED PROCESSES ==="
              ps aux | grep -E '[n]ode|[l]itespeed|[a]pache|[p]assenger' | head -20
              echo "=== SERVER.JS FILES ==="
              find /home -name "server.js" 2>/dev/null | grep -v node_modules | head -20
              find /var/www -name "server.js" 2>/dev/null | grep -v node_modules | head -10
              echo "=== PACKAGE.JSON LOCATIONS ==="
              find /home -maxdepth 5 -name "package.json" 2>/dev/null | grep -v node_modules | head -20
              find /var/www -maxdepth 5 -name "package.json" 2>/dev/null | grep -v node_modules | head -10
              echo "=== HOME DIR TREE (depth 3) ==="
              find /home -maxdepth 3 -type d 2>/dev/null | grep -v node_modules | grep -v '.next' | head -40
              echo "=== LITESPEED CONFIG DIR ==="
              ls /usr/local/lsws/ 2>/dev/null || echo "no /usr/local/lsws"
              ls /usr/local/lsws/conf/ 2>/dev/null || true
              echo "=== LITESPEED VHOSTS ==="
              ls /usr/local/lsws/conf/vhosts/ 2>/dev/null || echo "no vhosts dir"
              find /usr/local/lsws -name "*.conf" 2>/dev/null | grep -v 'backup\|bak' | head -20
              echo "=== LITESPEED HTTPD CONFIG (first 80 lines) ==="
              sudo cat /usr/local/lsws/conf/httpd_config.conf 2>/dev/null | head -80 || echo "cannot read httpd_config.conf"
              echo "=== VHOST CONF CONTENTS ==="
              for f in $(ls /usr/local/lsws/conf/vhosts/ 2>/dev/null); do
                echo "--- vhost: $f ---"
                sudo cat /usr/local/lsws/conf/vhosts/$f/vhconf.conf 2>/dev/null | head -40 || true
              done
              echo "=== CPANEL USER DIRS ==="
              ls /var/cpanel/users/ 2>/dev/null | head -20 || echo "no /var/cpanel/users"
              ls /var/cpanel/ 2>/dev/null | head -20 || echo "no /var/cpanel"
              echo "=== CPANEL NODEJS APPS ==="
              find /home -name ".cpanel" -type d 2>/dev/null | head -10
              find /home -name "nodejs" -type d 2>/dev/null | head -10
              find /home -path "*node_modules/.bin/node" 2>/dev/null | head -5
              echo "=== NGINX SITES ==="
              ls /etc/nginx/sites-enabled/ 2>/dev/null || echo "no nginx sites-enabled"
              ls /etc/nginx/sites-available/ 2>/dev/null || echo "no nginx sites-available"
              echo "=== CURRENT REPO ==="
              cd /var/www/ydg-website
              git pull origin main
              git log --oneline -3
              echo "=== DONE ==="
            } > $DIAG 2>&1

            # Copy to every plausible web-accessible location
            sudo cp $DIAG /var/www/html/ydg_diag.txt 2>/dev/null || true
            sudo cp $DIAG /var/www/ydg-website/public/ydg_diag.txt 2>/dev/null || true
            sudo cp $DIAG /home/ubuntu/public_html/ydg_diag.txt 2>/dev/null || true
            sudo cp $DIAG /usr/local/lsws/Example/html/ydg_diag.txt 2>/dev/null || true

            # Print to Actions log too
            cat $DIAG
            echo "DIAGNOSTIC_COMPLETE"
