name: Deploy YDG to AWS
on:
  push:
    branches: [main]
jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 12m
          script: |
            export PATH=$PATH:/usr/local/bin

            APP_DIR=/var/www/ydg-website
            LOG="$APP_DIR/public/deploy.log.txt"

            # Stream all output to the public dir so we can read it via the browser
            {
              echo "=== DEPLOY START $(date) ==="
              echo "=== Node: $(node -v) npm: $(npm -v) ==="

              echo "=== [1] git pull ==="
              cd "$APP_DIR"
              git fetch origin main 2>&1 || true
              git reset --hard origin/main 2>&1
              git log --oneline -3

              echo "=== [2] npm ci ==="
              npm ci 2>&1
              echo "npm ci exit: $?"

              echo "=== [2b] prisma generate ==="
              npx prisma generate 2>&1 || echo "prisma generate failed (ok if db not needed)"

              echo "=== [3] npm run build ==="
              npm run build 2>&1
              BUILD_EXIT=$?
              echo "BUILD EXIT CODE: $BUILD_EXIT"

              if [ "$BUILD_EXIT" -ne 0 ]; then
                echo "BUILD FAILED — not restarting pm2"
                echo "=== DEPLOY FAILED $(date) ==="
                exit "$BUILD_EXIT"
              fi

              echo "=== [4] restart pm2 ==="
              pm2 stop all 2>/dev/null || true
              pm2 delete all 2>/dev/null || true
              sudo fuser -k 3000/tcp 2>/dev/null || true
              sleep 2
              pm2 start "$APP_DIR/server.js" --name ydg --cwd "$APP_DIR"
              pm2 save

              echo "=== [5] verify ==="
              sleep 4
              pm2 status
              curl -s -o /dev/null -w "HTTP %{http_code} on :3000\n" http://localhost:3000/ || echo "not yet responding"

              echo "=== DEPLOY SUCCESS $(date) ==="
            } 2>&1 | tee "$LOG"

            echo "Log written to $LOG — readable at /deploy.log.txt"
