name: Deploy YDG to AWS
on:
  push:
    branches: [main]
jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            export PATH=$PATH:/usr/local/bin
            set -e

            APP_DIR=/var/www/ydg-website

            echo "=== [1/5] Pull latest code ==="
            cd "$APP_DIR"
            git pull origin main
            git log --oneline -3

            echo "=== [2/5] Install dependencies ==="
            npm ci --prefer-offline

            echo "=== [3/5] Build Next.js app ==="
            npm run build

            echo "=== [4/5] Restart server via pm2 ==="
            # Stop any existing pm2 processes cleanly
            pm2 stop all 2>/dev/null || true
            pm2 delete all 2>/dev/null || true

            # Kill anything still on port 3000
            sudo fuser -k 3000/tcp 2>/dev/null || true
            sleep 2

            # Start fresh from the correct directory
            pm2 start "$APP_DIR/server.js" --name ydg --cwd "$APP_DIR"
            pm2 save

            echo "=== [5/5] Verify process is up ==="
            sleep 3
            pm2 status
            curl -s -o /dev/null -w "HTTP %{http_code} on port 3000\n" http://localhost:3000/ || echo "port 3000 not responding yet"

            echo "DEPLOY_COMPLETE"
