name: Deploy YDG to AWS
on:
  push:
    branches: [main]
jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate || true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build Next.js app (on runner — avoids EC2 RAM limits)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Setup SSH key for rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync built app to EC2 (/var/www/ydg-website)
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/ydg-website/"

      - name: Restart app on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 8m
          script: |
            export PATH=$PATH:/usr/local/bin
            OUR_DIR=/var/www/ydg-website

            echo "=== Pre-deploy diagnostics ==="
            echo "--- Listening ports ---"
            sudo ss -tlnp 2>/dev/null || sudo netstat -tlnp 2>/dev/null || true
            echo "--- Node processes ---"
            sudo ps aux | grep -E '\bnode\b|\bserver\.js\b' | grep -v grep || true
            echo "--- pm2 status ---"
            pm2 status 2>/dev/null || true

            echo "=== Detect live Node.js port ==="
            # Grab the port(s) any node/server.js process is listening on BEFORE we kill anything
            LIVE_NODE_PORT=$(sudo ss -tlnp 2>/dev/null \
              | grep -E 'node|server' \
              | grep -oP '(?<=:)\d{4,5}' \
              | grep -v '^22$\|^80$\|^443$\|^3306$\|^5432$' \
              | head -1)
            # Fallback: netstat
            if [ -z "$LIVE_NODE_PORT" ]; then
              LIVE_NODE_PORT=$(sudo netstat -tlnp 2>/dev/null \
                | grep -E 'node|server' \
                | grep -oE ':[0-9]{4,5} ' \
                | grep -oE '[0-9]+' \
                | grep -v '^22$\|^80$\|^443$' \
                | head -1)
            fi
            # Fallback: use 3000
            LIVE_NODE_PORT="${LIVE_NODE_PORT:-3000}"
            echo "LIVE_NODE_PORT=$LIVE_NODE_PORT"

            echo "=== Check .htaccess / vhost proxy config ==="
            sudo find /home /var/www -maxdepth 5 -name ".htaccess" 2>/dev/null \
              | xargs sudo grep -l "ProxyPass\|PassengerPort\|proxy_pass\|node" 2>/dev/null \
              | head -3 \
              | while read f; do echo "=== $f ==="; sudo cat "$f"; done || true

            echo "=== LiteSpeed virtualhost configs ==="
            sudo find /usr/local/lsws/conf -name "*.conf" 2>/dev/null | head -5 \
              | xargs sudo grep -l "proxy\|extapp\|node\|3000\|8080" 2>/dev/null \
              | head -3 \
              | while read f; do echo "=== $f ==="; sudo head -80 "$f"; done || true

            echo "=== Install prod deps in our dir ==="
            cd "$OUR_DIR"
            npm ci --omit=dev 2>/dev/null || npm install --production 2>/dev/null || true

            echo "=== Find the live app dir via BUILD_ID ==="
            OLD_BUILD="FO0zCOSdCWN3V-r_U6Twz"
            LIVE_BUILD=$(sudo find /home /var/www -name "BUILD_ID" 2>/dev/null \
              | xargs sudo grep -l "$OLD_BUILD" 2>/dev/null | head -1)

            if [ -n "$LIVE_BUILD" ]; then
              LIVE_APP=$(dirname "$(dirname "$LIVE_BUILD")")
              echo "LIVE APP FOUND: $LIVE_APP"

              if [ "$LIVE_APP" != "$OUR_DIR" ]; then
                echo "=== Rsyncing our build into live app dir: $LIVE_APP ==="
                sudo rsync -a --delete \
                  --exclude='.git' \
                  --exclude='node_modules' \
                  "$OUR_DIR/" "$LIVE_APP/"

                echo "=== Killing the live process in $LIVE_APP ==="
                for pid in $(sudo pgrep -f "server.js" 2>/dev/null); do
                  CWD=$(sudo readlink -f /proc/$pid/cwd 2>/dev/null)
                  if [ "$CWD" = "$LIVE_APP" ]; then
                    echo "Killing PID $pid (cwd=$LIVE_APP)"
                    sudo kill -TERM "$pid" || true
                  fi
                done
                sleep 3
              else
                echo "Live app IS our dir ($OUR_DIR) — no extra rsync needed"
              fi
            else
              echo "OLD BUILD_ID not found — live app dir might already be our dir"
            fi

            echo "=== Stop existing processes and free the port ==="
            pm2 stop all 2>/dev/null || true
            pm2 delete all 2>/dev/null || true
            # Kill anything on LIVE_NODE_PORT and on 3000
            sudo fuser -k "${LIVE_NODE_PORT}/tcp" 2>/dev/null || true
            sudo fuser -k 3000/tcp 2>/dev/null || true
            sleep 3

            echo "=== Start app on detected port: PORT=$LIVE_NODE_PORT ==="
            PORT=$LIVE_NODE_PORT pm2 start "$OUR_DIR/server.js" \
              --name ydg \
              --cwd "$OUR_DIR" \
              -- --port "$LIVE_NODE_PORT" 2>/dev/null || \
            PORT=$LIVE_NODE_PORT pm2 start "$OUR_DIR/server.js" \
              --name ydg \
              --cwd "$OUR_DIR"
            pm2 save

            echo "=== Verify ==="
            sleep 6
            pm2 status
            NEW_BUILD=$(cat "$OUR_DIR/.next/BUILD_ID" 2>/dev/null || echo "unknown")
            echo "Our build ID: $NEW_BUILD"
            echo "Testing port $LIVE_NODE_PORT..."
            curl -s -o /dev/null -w "HTTP %{http_code} on :${LIVE_NODE_PORT}\n" \
              "http://localhost:${LIVE_NODE_PORT}/" || true
            echo "Testing port 3000..."
            curl -s -o /dev/null -w "HTTP %{http_code} on :3000\n" \
              "http://localhost:3000/" || true

            echo "=== pm2 logs (last 30 lines) ==="
            pm2 logs --nostream --lines 30 2>/dev/null || true

            echo "DEPLOY_COMPLETE"
