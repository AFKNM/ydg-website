name: Deploy YDG to AWS
on:
  push:
    branches: [main]
jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export PATH=$PATH:/usr/local/bin
            echo "=== PORT 80 PROCESSES ==="
            sudo lsof -i:80 2>/dev/null || ss -tlnp | grep ':80'
            echo "=== PORT 3000 PROCESSES ==="
            sudo lsof -i:3000 2>/dev/null || ss -tlnp | grep ':3000'
            echo "=== ALL NODE PROCESSES ==="
            ps aux | grep -E '[n]ode|[l]itespeed|[a]pache' | head -20
            echo "=== SERVER.JS FILES ==="
            find /home -name "server.js" 2>/dev/null | grep -v node_modules | head -10
            find /var/www -name "server.js" 2>/dev/null | grep -v node_modules | head -10
            echo "=== PACKAGE.JSON LOCATIONS ==="
            find /home -maxdepth 4 -name "package.json" 2>/dev/null | grep -v node_modules | head -10
            echo "=== NGINX STATUS ==="
            sudo nginx -t 2>&1 || true
            sudo systemctl status nginx 2>/dev/null | head -5 || true
            echo "=== LITESPEED STATUS ==="
            sudo systemctl status lsws 2>/dev/null | head -5 || true
            sudo systemctl status litespeed 2>/dev/null | head -5 || true
            echo "=== NGINX SITES-ENABLED ==="
            ls /etc/nginx/sites-enabled/ 2>/dev/null || echo "no nginx sites-enabled"
            echo "=== HOME DIRS ==="
            ls /home/ 2>/dev/null
            ls /home/ubuntu/ 2>/dev/null | head -20
            echo "=== CURRENT REPO STATE ==="
            cd /var/www/ydg-website
            git pull origin main
            git log --oneline -3
            echo "DIAGNOSTIC_COMPLETE"
